<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CogniWorld — Field Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101615;
    --panel: #182220;
    --panel-border: #2a3733;
    --text-primary: #e9e5d8;
    --text-secondary: #93a19a;
    --text-muted: #5f6b66;
    --moss: #8fae66;
    --rust: #b8683a;
    --amber: #c9a24a;
    --teal: #5a9e94;
    --font-display: 'Spectral', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text-primary);
    font-family: var(--font-mono);
  }
  .app { display: flex; height: 100vh; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    display: flex; align-items: baseline; gap: 24px;
    padding: 18px 24px; border-bottom: 1px solid var(--panel-border);
  }
  .topbar h1 {
    font-family: var(--font-display); font-weight: 600; font-size: 22px;
    margin: 0; letter-spacing: 0.02em; color: var(--text-primary);
  }
  .topbar .tag {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em;
    text-transform: uppercase; border: 1px solid var(--panel-border);
    padding: 3px 8px; border-radius: 3px;
  }
  .stats { margin-left: auto; display: flex; gap: 20px; font-size: 13px; color: var(--text-secondary); }
  .stats b { color: var(--moss); font-weight: 700; }

  .canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow: auto;
  }
  #world { border: 1px solid var(--panel-border); border-radius: 4px; cursor: crosshair; image-rendering: pixelated; }

  .legend {
    display: flex; gap: 16px; padding: 10px 24px; border-top: 1px solid var(--panel-border);
    font-size: 11px; color: var(--text-muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .sidebar {
    width: 320px; border-left: 1px solid var(--panel-border);
    background: var(--panel); padding: 20px; overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-family: var(--font-display); font-size: 16px; font-weight: 600;
    margin: 0 0 4px; color: var(--text-primary);
  }
  .empty-state {
    color: var(--text-muted); font-size: 13px; line-height: 1.7;
    padding-top: 12px; border-top: 1px dashed var(--panel-border); margin-top: 12px;
  }

  .card { border-top: 1px dashed var(--panel-border); margin-top: 12px; padding-top: 14px; }
  .card .id-row { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 10px; }
  .thought {
    font-family: var(--font-display); font-style: italic; font-size: 14px;
    color: var(--text-primary); line-height: 1.5; margin-bottom: 16px;
    padding: 10px 12px; background: rgba(143,174,102,0.06); border-left: 2px solid var(--moss);
  }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--text-secondary); }
  .stat-row b { color: var(--text-primary); }

  .bar-label { font-size: 11px; color: var(--text-muted); margin: 10px 0 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .bar-track { height: 5px; background: #0d1211; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }

  .energy-track { height: 6px; background: #0d1211; border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .energy-fill { height: 100%; background: var(--moss); border-radius: 3px; transition: width 0.3s ease; }
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <h1>CogniWorld</h1>
      <span class="tag">field station</span>
      <div class="stats">
        <span>step <b id="stat-step">0</b></span>
        <span>population <b id="stat-alive">0</b></span>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="world" width="640" height="640"></canvas>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#b8683a"></span> fear</span>
      <span><span class="dot" style="background:#c9a24a"></span> hunger</span>
      <span><span class="dot" style="background:#5a9e94"></span> curiosity</span>
      <span><span class="dot" style="background:#8fae66"></span> contentment</span>
      <span style="margin-left:auto">click a specimen to inspect</span>
    </div>
  </div>

  <div class="sidebar">
    <h2>Specimen log</h2>
    <div id="panel-content">
      <div class="empty-state">Click any dot in the world to inspect that individual's current state — goal, emotion, and thought.</div>
    </div>
  </div>
</div>

<script>
const CELL = 5;
const BIOME_COLORS = {
  0: "#5b7a3f", // plains
  1: "#3c6f8c", // river
  2: "#5c5c58", // mountain
  3: "#8a7a4a", // desert
  4: "#2c2624", // cave
};
const EMOTION_COLORS = ["#b8683a", "#c9a24a", "#5a9e94", "#8fae66"]; // fear, hunger, curiosity, contentment
const EMOTION_NAMES = ["fear", "hunger", "curiosity", "contentment"];

const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
let biome = null;
let latestAgents = [];
let selectedId = null;

async function loadBiome() {
  const res = await fetch('/biome');
  const data = await res.json();
  biome = data.biome;
  const size = biome.length;
  canvas.width = size * CELL;
  canvas.height = size * CELL;
  drawBiome();
}

function drawBiome() {
  if (!biome) return;
  const size = biome.length;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      ctx.fillStyle = BIOME_COLORS[biome[y][x]] || "#333";
      ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }
  }
}

function dominantEmotionIdx(emotion) {
  let best = 0;
  for (let i = 1; i < emotion.length; i++) if (emotion[i] > emotion[best]) best = i;
  return best;
}

function render() {
  drawBiome();
  for (const a of latestAgents) {
    const color = EMOTION_COLORS[dominantEmotionIdx(a.emotion)];
    ctx.beginPath();
    ctx.arc(a.x * CELL + CELL / 2, a.y * CELL + CELL / 2, a.id === selectedId ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    if (a.id === selectedId) {
      ctx.strokeStyle = "#e9e5d8";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}

function renderPanel(agent) {
  const panel = document.getElementById('panel-content');
  if (!agent) {
    panel.innerHTML = '<div class="empty-state">That specimen is no longer present.</div>';
    return;
  }
  const bars = agent.emotion.map((v, i) => `
    <div class="bar-label">${EMOTION_NAMES[i]}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v*100)}%; background:${EMOTION_COLORS[i]}"></div></div>
  `).join('');

  panel.innerHTML = `
    <div class="card">
      <div class="id-row">specimen #${agent.id} — ${agent.goal}</div>
      <div class="thought">"${agent.thought}"</div>
      <div class="stat-row"><span>energy</span><b>${agent.energy}</b></div>
      <div class="energy-track"><div class="energy-fill" style="width:${Math.min(100, agent.energy/2)}%"></div></div>
      ${bars}
    </div>
  `;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / CELL;
  const cy = (e.clientY - rect.top) / CELL;
  let nearest = null, bestDist = Infinity;
  for (const a of latestAgents) {
    const d = (a.x - cx) ** 2 + (a.y - cy) ** 2;
    if (d < bestDist) { bestDist = d; nearest = a; }
  }
  if (nearest && bestDist < 16) {
    selectedId = nearest.id;
    renderPanel(nearest);
  }
});

async function pollState() {
  try {
    const res = await fetch('/state');
    const data = await res.json();
    latestAgents = data.agents;
    document.getElementById('stat-step').textContent = data.step;
    document.getElementById('stat-alive').textContent = data.alive;
    render();
    if (selectedId !== null) {
      const found = latestAgents.find(a => a.id === selectedId);
      if (found) renderPanel(found);
    }
  } catch (e) { /* server still starting */ }
}

loadBiome().then(() => {
  setInterval(pollState, 250);
});
</script>
</body>
</html>
